<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2&family=Exo:wght@500&family=Montserrat&family=Phudu&display=swap"
      rel="stylesheet"
    />
    <title>Contact</title>
    <link rel="icon" href="./assets/logo/logo.png" sizes="32x32" />
    <link rel="stylesheet" href="./style/contact.css" />
  </head>

  <body>
    <!-- loading -->
    <div class="loading">
      <img src="./assets/gif/portfolio.gif" alt="intro" />
    </div>

    <!-- header -->
    <header class="head hidden">
      <h2 class="portfolio">
        <a class="link" href="./index.html">Portfolio</a
        ><span class="point">.</span>
      </h2>
      <nav class="navbar">
        <ul class="navbar_list">
          <li class="navbar_list-item">
            <a class="link" href="./index.html">Home</a>
          </li>
          <li class="navbar_list-item">
            <a class="link" href="./skills.html">Skills</a>
          </li>
          <li class="navbar_list-item">
            <a class="link" href="./about.html">About</a>
          </li>
          <li class="navbar_list-item">
            <a class="link" href="./project.html">Projects</a>
          </li>
          <li class="navbar_list-item">
            <a class="link" href="./contact.html">Contact</a>
          </li>
          <li class="darkLight">
            <ion-icon class="darkLight-moon" name="moon-outline"></ion-icon>
            <ion-icon class="darkLight-sun" name="sunny-outline"></ion-icon>
          </li>
        </ul>
      </nav>
    </header>

    <!-- main -->
    <main class="main hidden">
      <section class="container">
        <div class="panel">
          <h1 class="panel-content">Contact Us</h1>

          <form class="panel-form">
            <label class="panel-form_label" for="name">Name:</label>
            <input
              type="text"
              class="panel-form_input design"
              id="name"
              placeholder="Enter the your name please!"
            />
            <small class="panel-error"></small>

            <label class="panel-form_label" for="email">Email:</label>
            <input
              type="email"
              class="panel-form_input design"
              id="email"
              placeholder="Enter the your email please!"
            />
            <small class="panel-error"></small>

            <label class="panel-form_label" for="message">Message:</label>
            <textarea
              class="panel-form_textarea design"
              id="message"
              rows="5"
              placeholder="Enter the message please!"
            ></textarea>
            <small class="panel-error"></small>
          </form>

          <div class="sending">
            <button class="sending-button" type="submit">Submit</button>
            <p class="sending-success"></p>
          </div>
        </div>
      </section>
    </main>

    <!-- scripts -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <script src="./js/contact.js"></script>
    <script src="./utils/activited.js"></script>
    <script src="./utils/loading.js"></script>
    <script src="./utils/dark-light.js"></script>
  </body>
</html>
